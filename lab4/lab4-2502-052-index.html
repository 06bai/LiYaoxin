<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/lab4-2502-052-index.css">
</head>
<body>
    <title>图书商场</title>
    <div class="header">
        <div class="logo-img"></div>
        <div class="nav">
            <div class="nav-item">首页</div>
            <div class="nav-item">热销</div>
            <div class="nav-item">少儿童书</div>
            <div class="nav-item">正版教材</div>
            <div class="nav-item">电子书</div>
             <div class="nav-item login-btn" onclick="showLogin()">登录/注册</div>
             <div class="icon cart-icon">🛒</div>
            <div class="icon search-icon">🔍</div>
        </div>
    </div>

    <div class="login-wrap" id="loginWrap">
    <div class="login-box">
        <div class="close" onclick="closeLogin()">×</div>

        <!-- 登录表单 -->
        <form id="formLogin" onsubmit="return loginCheck()">
            <h3>登录</h3>
            <input type="text" name="user" placeholder="用户名"><br>
            <input type="password" name="pwd" placeholder="密码"><br>
            <button type="submit">登录</button>
            <p onclick="showReg()">没有账号？去注册</p>
        </form>

        <!-- 注册表单 -->
        <form id="formReg" class="hide" onsubmit="return saveUser()">
            <h3>注册</h3>
            <input type="text" name="user" placeholder="用户名"><br>
            <input type="password" name="pwd" placeholder="密码"><br>
            <button type="submit">注册</button>
            <p onclick="showLogin()">返回登录</p>
        </form>
    </div>
</div>
    
    <div class="container">
        <!-- 左侧栏 -->
        <div class="left">
            <div class="title">图书分类</div>
            <div class="link-item">文学小说</div>
            <div class="link-item">计算机技术</div>
            <div class="link-item">生活休闲</div>
            <div class="link-item">少儿读物</div>
        </div>

        <!-- 中间内容 -->
        <div class="main-content">
    <div class="hover-box">
        <div class="mask">点击查看详情</div>
    </div>
            <!-- 热门推荐 -->
            <div class="hot-recommend">
                <div class="title">热门推荐</div>
                <div class="book-list">
                    <div class="book-item">
                        <div class="item-img"></div>
                        <div class="item-text">信号与系统</div>
                    </div>
                    <div class="book-item">
                        <div class="item-img"></div>
                        <div class="item-text">HTTP</div>
                    </div>
                    <div class="book-item">
                        <div class="item-img"></div>
                        <div class="item-text">图解TCP/IP</div>
                    </div>
                    <div class="book-item">
                        <div class="item-img"></div>
                        <div class="item-text">第一行代码</div>
                    </div>
                </div>
            </div>
            <!-- 新书上市 -->
            <div class="new-book">
                <div class="title">新书上市</div>
                <table>
                    <tr>
                        <th>图书名称</th>
                        <th>作者</th>
                        <th>定价</th>
                        <th>出版日期</th>
                    </tr>
                    <tr>
                        <td>AI时代的编程思维</td>
                        <td>李华</td>
                        <td>¥89.00</td>
                        <td>2025-01-15</td>
                    </tr>
                    <tr>
                        <td>前端开发实战</td>
                        <td>张明</td>
                        <td>¥79.00</td>
                        <td>2025-02-20</td>
                    </tr>
                    <tr>
                        <td>数据结构与算法</td>
                        <td>王芳</td>
                        <td>¥69.00</td>
                        <td>2025-03-10</td>
                    </tr>
                </table>
            </div>
        </div>

        <!-- 右侧栏 -->
        <div class="right">
            <div class="title">限时促销</div>
            <div class="promo-item">
                <div class="promo-img"></div>
                <div class="promo-text">满200减20</div>
            </div>
            <div class="promo-item">
                <div class="promo-img"></div>
                <div class="promo-text">新书7.5折</div>
            </div>
        </div>
    </div>

    <script>
function showLogin() {
    loginWrap.style.display = "block";
    formLogin.classList.remove("hide");
    formReg.classList.add("hide");
}

// 显示注册
function showReg() {
    formReg.classList.remove("hide");
    formLogin.classList.add("hide");
}

// 关闭弹窗
function closeLogin() {
    loginWrap.style.display = "none";
}

// 注册保存到本地存储
function saveUser() {
    let user = formReg.user.value;
    let pwd = formReg.pwd.value;
    localStorage.setItem("user", user);
    localStorage.setItem("pwd", pwd);
    alert("注册成功！");
    showLogin();
    return false;
}

// 登录验证
function loginCheck() {
    let user = formLogin.user.value;
    let pwd = formLogin.pwd.value;
    let storeUser = localStorage.getItem("user");
    let storePwd = localStorage.getItem("pwd");

    if (user === storeUser && pwd === storePwd) {
        alert("登录成功！");
        closeLogin();
    } else {
        alert("用户名或密码错误");
    }
    return false;
}
</script>

    <!-- 页脚 -->
    <div class="footer">
        <div>本网站由李曜鑫倾心制作</div>
    </div>
</body>
</html>
